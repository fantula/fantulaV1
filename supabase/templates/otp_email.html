<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#0a0a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a1a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="440" cellpadding="0" cellspacing="0" style="max-width:440px;width:100%;">
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:30px;">
              <span style="font-size:28px;font-weight:700;color:#e94560;letter-spacing:2px;">FANTULA</span>
              <br>
              <span style="font-size:12px;color:#6a6a8a;letter-spacing:4px;">凡图拉</span>
            </td>
          </tr>
          <!-- Card -->
          <tr>
            <td style="background:#16213e;border-radius:16px;overflow:hidden;">
              <!-- Header -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:35px 35px 20px;text-align:center;">
                    <div style="width:60px;height:60px;margin:0 auto 15px;background:#0f3460;border-radius:50%;line-height:60px;font-size:28px;">
                      🔐
                    </div>
                    <h1 style="margin:0;font-size:20px;color:#ffffff;font-weight:600;">
                      邮箱验证码
                    </h1>
                    <p style="margin:8px 0 0;font-size:13px;color:#8a8ab0;">
                      请使用以下验证码完成验证
                    </p>
                  </td>
                </tr>
              </table>
              <!-- Code -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:10px 35px 25px;text-align:center;">
                    <div style="background:#0f3460;border:1px solid #1a3a6e;border-radius:12px;padding:20px;display:inline-block;min-width:200px;">
                      <div style="font-size:36px;font-weight:700;color:#e94560;letter-spacing:8px;font-family:'Courier New',monospace;">
                        {{ .Token }}
                      </div>
                    </div>
                  </td>
                </tr>
              </table>
              <!-- Info -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:0 35px 30px;">
                    <div style="background:#0d1b38;border-radius:8px;padding:12px 16px;border-left:3px solid #e94560;">
                      <p style="margin:0;font-size:12px;color:#a0a0c0;">
                        ⏱ 验证码有效期为 <strong style="color:#e94560;">5 分钟</strong>，请尽快使用
                      </p>
                    </div>
                  </td>
                </tr>
              </table>
              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:0 35px;">
                    <div style="height:1px;background:#1a3a6e;"></div>
                  </td>
                </tr>
              </table>
              <!-- Footer -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:20px 35px 25px;text-align:center;">
                    <p style="margin:0 0 5px;font-size:11px;color:#6a6a8a;">
                      如果您没有请求此验证码，请忽略此邮件
                    </p>
                    <p style="margin:0;font-size:11px;color:#6a6a8a;">
                      © 2026 Fantula 凡图拉 · 海外数字商品平台
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
