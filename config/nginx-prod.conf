# Fantula Production Nginx Configuration
# 管理方式: 本文件是 Nginx 配置的唯一真理源 (SSOT)
# 部署时由 deploy.sh 自动同步到服务器 /etc/nginx/sites-available/fantula.conf
# 架构: 自托管 Supabase (本地 Kong 8000) + Nuxt 3 SSR (PM2 3000)

# ==========================================
# Gzip 压缩
# 注意: gzip on 已在 /etc/nginx/nginx.conf 中启用
# 此处仅补充 types (nginx.conf 中这些行被注释了)
# ==========================================
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

# ==========================================
# HTTP → HTTPS 重定向
# ==========================================
server {
    listen 80;
    server_name www.fantula.com fantula.com;
    return 301 https://www.fantula.com$request_uri;
}

# ==========================================
# HTTPS 主站
# ==========================================
server {
    listen 443 ssl;
    server_name www.fantula.com fantula.com;

    ssl_certificate /etc/letsencrypt/live/www.fantula.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.fantula.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ------------------------------------------
    # 微信公众号验证文件
    # ------------------------------------------
    location = /MP_verify_PPieTbksUNhjGksV.txt {
        alias /opt/fantula/nuxt-frontend/public/MP_verify_PPieTbksUNhjGksV.txt;
    }

    # ------------------------------------------
    # Supabase Auth 邮件模板托管
    # ------------------------------------------
    location /templates/ {
        alias /opt/supabase/docker/volumes/auth/templates/;
        add_header Cache-Control "public, max-age=3600";
    }

    # ------------------------------------------
    # Supabase API → 本地 Kong 网关 (自托管)
    # ------------------------------------------
    location /rest/v1/ {
        proxy_pass http://127.0.0.1:8000/rest/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/v1/ {
        proxy_pass http://127.0.0.1:8000/auth/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage/v1/ {
        proxy_pass http://127.0.0.1:8000/storage/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /realtime/v1/ {
        proxy_pass http://127.0.0.1:8000/realtime/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /functions/v1/ {
        proxy_pass http://127.0.0.1:8000/functions/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 15m;  # 允许最大 15MB 上传（代码层限制 10MB，留余量）
    }

    # ------------------------------------------
    # Nuxt 静态资源 (文件名含 content hash, 长缓存)
    # ------------------------------------------
    location /_nuxt/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------
    # Nuxt SSR 前端 (HTML 不缓存, 确保每次获取最新 chunk 引用)
    # ------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
