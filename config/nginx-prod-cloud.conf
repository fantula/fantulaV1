server {
    listen 80;
    server_name www.fantula.com fantula.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name www.fantula.com;

    ssl_certificate /etc/letsencrypt/live/www.fantula.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.fantula.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Wechat Verify
    location = /MP_verify_PPieTbksUNhjGksV.txt {
        alias /opt/fantula/nuxt-frontend/public/MP_verify_PPieTbksUNhjGksV.txt;
    }

    # ==========================================
    # Supabase Cloud Proxy (Unified)
    # Proxies ALL Supabase sub-services to Cloud
    # ==========================================
    location ~ ^/(rest|auth|storage|realtime|functions)/v1/ {
        # Proxy to Supabase Cloud Project
        proxy_pass https://vjvmzcodbeijnembjiig.supabase.co;
        
        # SSL/SNI Configuration (Crucial for Cloudflare/Supabase)
        proxy_ssl_server_name on;
        proxy_set_header Host vjvmzcodbeijnembjiig.supabase.co;
        
        # Forwarding Headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket / Keep-Alive
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ==========================================
    # Nuxt Frontend (Local PM2)
    # ==========================================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
